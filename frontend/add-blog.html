<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Blog | Admin / Supervisor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
      color: #333;
    }

    .container {
      max-width: 800px;
      background: #ffffffcc;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      text-align: center;
      color: #2c3e50;
      position: relative;
      margin-bottom: 50px;
    }

    h2::after {
      content: "";
      width: 60px;
      height: 4px;
      background: linear-gradient(90deg, #e74c3c, #f1c40f);
      display: block;
      margin: 10px auto 0;
      border-radius: 2px;
      animation: underlineAnim 1.5s infinite alternate;
    }

    @keyframes underlineAnim {
      0% { width: 30px; opacity: 0.4; }
      50% { width: 60px; opacity: 1; }
      100% { width: 30px; opacity: 0.4; }
    }

    form .form-label {
      font-weight: 500;
      color: #34495e;
      transition: color 0.3s ease;
    }

    form input, form textarea {
      border-radius: 15px;
      border: 2px solid #ccc;
      transition: all 0.3s ease;
      padding: 12px 15px;
      font-size: 1rem;
    }

    form input:focus, form textarea:focus {
      border-color: #e74c3c;
      box-shadow: 0 0 15px rgba(231,76,60,0.3);
      outline: none;
      transform: scale(1.02);
    }

    input[type="file"] {
      padding: 6px 10px;
    }

    button {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1.1rem;
      border-radius: 12px;
      background: linear-gradient(90deg, #e74c3c, #f1c40f);
      border: none;
      padding: 12px 25px;
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      display: block;
      width: 100%;
    }

    button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 25px rgba(0,0,0,0.3);
    }

    /* Subtle animated background lines */
    .container::before, .container::after {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.05) 1px,
        transparent 1px,
        transparent 20px
      );
      animation: moveLines 15s linear infinite;
      pointer-events: none;
    }

    .container::after {
      transform: rotate(90deg);
      animation-duration: 20s;
    }

    @keyframes moveLines {
      0% { background-position: 0 0; }
      100% { background-position: 100px 100px; }
    }

    /* Responsive */
    @media(max-width: 768px) {
      .container { padding: 30px 20px; }
    }

  </style>
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h2>📝 Add New Blog</h2>

    <form id="blogForm" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" class="form-control" id="title" placeholder="Enter blog title" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <input type="text" class="form-control" id="category" placeholder="Tech, Media, News">
      </div>

      <div class="mb-3">
        <label class="form-label">Caption</label>
        <textarea class="form-control" id="caption" rows="3" placeholder="Write a catchy caption..."></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Image</label>
        <input type="file" class="form-control" id="image">
      </div>

      <button class="btn btn-primary">🚀 Publish Blog</button>
    </form>
  </div>

  <script src="js/add-blog.js"></script>
</body>
</html>
