<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile | Pruthvi Landmarks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root { --gold: linear-gradient(135deg, #c9a44c, #f5e28a, #c9a44c); }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: #fff;
      transition: all .4s ease;
    }

    body.dark-mode {
      background: #f4f6f9;
      color: #111;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 25px 50px;
    }

    .profile-layout {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      padding: 60px;
      min-height: 80vh;
    }

    .brand-panel h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      background: var(--gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .profile-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      border-radius: 22px;
      padding: 35px;
      position: relative;
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      padding: 3px;
      background: var(--gold);
      cursor: pointer;
    }

    .form-control {
      background: rgba(0,0,0,.4);
      border: 1px solid #444;
      color: #fff;
      border-radius: 12px;
    }

    body.dark-mode .form-control {
      background: #fff;
      color: #000;
    }

    @media(max-width:992px){
      .profile-layout{ grid-template-columns:1fr; padding:30px; }
    }
  </style>
</head>

<body>

<div class="top-bar">
  <button class="btn btn-outline-light" id="themeToggle">🌙 Dark Mode</button>
  <button class="btn btn-outline-danger" onclick="logout()">Logout</button>
</div>

<div class="profile-layout">

  <div class="brand-panel">
    <h1>Luxury Real Estate</h1>
    <p class="mt-3">
      A premium profile experience designed for professionals shaping modern skylines.
    </p>
  </div>

  <div class="profile-card d-none" id="profileForm">

    <div class="text-center mb-3">
      <img id="avatar" class="avatar" src="https://via.placeholder.com/120">
      <input type="file" id="photo" class="form-control mt-2 d-none">
    </div>

    <input id="name" class="form-control mb-2" disabled>
    <input id="email" class="form-control mb-2" disabled>
    <input id="role" class="form-control mb-3" disabled>

    <div class="d-grid gap-2">
      <button class="btn btn-warning" id="editBtn" disabled>✏️ Edit Profile</button>
      <button class="btn btn-primary d-none" id="saveBtn">💾 Save Changes</button>
    </div>

  </div>

</div>

<script src="./js/profile.js"></script>
</body>
</html>
