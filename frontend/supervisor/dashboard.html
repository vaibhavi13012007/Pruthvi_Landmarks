<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supervisor Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Animate.css -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --secondary: #ec4899;
      --dark: #0f172a;
      --light: #f8fafc;
      --glass: rgba(255,255,255,0.75);
    }

    body {
      background: radial-gradient(circle at top, #eef2ff, #f8fafc);
      font-family: 'Inter', sans-serif;
      color: #1f2937;
      transition: background 0.4s, color 0.4s;
    }

    body.dark {
      background: radial-gradient(circle at top, #020617, #020617);
      color: #e5e7eb;
    }

    h2, h4 {
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.5px;
    }

    /* Animated Divider */
    .divider {
      height: 3px;
      width: 120px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      animation: slide 3s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes slide {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }

    /* Glass Panels */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    body.dark .glass {
      background: rgba(15,23,42,0.85);
      border-color: rgba(255,255,255,0.08);
    }

    /* Stat Cards */
    .stat-card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      padding: 24px;
      color: #fff;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .stat-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .stat-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    }

    .bg-blog {
      background: linear-gradient(135deg, #4f46e5, #818cf8);
    }

    .bg-comment {
      background: linear-gradient(135deg, #059669, #34d399);
    }

    /* Add Button */
    .btn-add {
      background: linear-gradient(135deg, var(--secondary), #f472b6);
      color: #fff;
      border-radius: 30px;
      padding: 12px 26px;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(236,72,153,0.4);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-add:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 35px rgba(236,72,153,0.55);
    }

    /* Table */
    .table {
      border-radius: 16px;
      overflow: hidden;
    }

    .table th {
      background: linear-gradient(135deg, #020617, #1e293b);
      color: #fff;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.8px;
    }

    .table tbody tr {
      transition: background 0.3s, transform 0.2s;
    }

    .table tbody tr:hover {
      background: rgba(99,102,241,0.08);
      transform: scale(1.01);
    }

    /* Preview Drawer */
    #previewDrawer {
      background: #fff;
      border-left: 3px solid;
      border-image: linear-gradient(var(--primary), var(--secondary)) 1;
    }

    body.dark #previewDrawer {
      background: #020617;
      color: #e5e7eb;
    }
  </style>
</head>

<body class="p-4">

  <!-- HEADER -->
  <h2 class="animate__animated animate__fadeInDown">🧑‍💼 Supervisor Control Panel</h2>
  <div class="divider"></div>

  <div class="form-check form-switch mb-4">
    <input class="form-check-input" type="checkbox" id="darkToggle">
    <label class="form-check-label">🌙 Executive Dark Mode</label>
  </div>

  <!-- STATS -->
  <div class="row g-4 mb-5 animate__animated animate__fadeInUp">
    <div class="col-md-4">
      <div class="stat-card bg-blog">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6>Total Blogs</h6>
            <h2 id="totalBlogs">0</h2>
          </div>
          <i class="bi bi-journal-richtext fs-1"></i>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="stat-card bg-comment">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6>Total Comments</h6>
            <h2 id="totalComments">0</h2>
          </div>
          <i class="bi bi-chat-dots-fill fs-1"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- BLOG MANAGEMENT -->
  <div class="d-flex justify-content-between align-items-center mb-3">
   
     <a href="../add-blog.html" class="btn btn-add">
    <i class="bi bi-plus-circle me-1"></i> Add Blog
  </a>
  </div>

  

  <!-- MODAL + PREVIEW (UNCHANGED FUNCTIONALITY) -->
  <!-- keep your existing modal & preview drawer here -->

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/supervisor-auth.js"></script>
  <script src="js/supervisor-dashboard.js"></script>

  <script>
    const toggle = document.getElementById("darkToggle");
    toggle.addEventListener("change", () => {
      document.body.classList.toggle("dark", toggle.checked);
    });
  </script>

</body>
</html>
